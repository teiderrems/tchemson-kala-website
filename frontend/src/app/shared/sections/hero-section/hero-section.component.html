<section class="bg-surface-container-low/60" [ngStyle]="backgroundStyle()" appScrollReveal>
  <div class="container-page grid grid-cols-1 items-center gap-10 py-10 sm:py-14 lg:min-h-[calc(100vh-5rem)] lg:grid-cols-[minmax(0,1fr)_minmax(440px,0.92fr)] lg:gap-16 lg:py-12 xl:gap-20 2xl:min-h-180">
    <div class="space-y-6 sm:space-y-8">
      <span class="inline-flex max-w-full items-center gap-2 rounded-full bg-primary-fixed px-3 py-1.5 text-xs font-bold leading-5 text-on-primary-fixed sm:px-4 sm:text-sm">
        <span class="material-symbols-outlined shrink-0 text-lg">school</span>
        <span class="min-w-0 wrap-break-word">{{ academicYearBadge() }}</span>
      </span>
      <div>
        <h1 class="font-display text-[2rem] font-extrabold leading-tight text-primary sm:text-4xl md:text-5xl xl:text-6xl">
          {{ title() }}
        </h1>
        <p class="mt-5 max-w-xl text-base leading-7 text-on-surface-variant sm:mt-6 sm:text-lg sm:leading-8">{{ subtitle() }}</p>
      </div>
      <div class="flex flex-col gap-4 sm:flex-row">
        <a href="#admissions" class="inline-flex min-h-14 w-full items-center justify-center gap-2 rounded-xl bg-primary px-5 py-3 text-center font-display text-base font-bold text-on-primary shadow-lg sm:w-auto sm:px-7 sm:py-4 sm:text-lg">
          <span class="min-w-0 wrap-break-word">{{ content('primaryAction') }}</span>
          <span class="material-symbols-outlined shrink-0">arrow_forward</span>
        </a>
        <a href="#contact" class="inline-flex min-h-14 w-full items-center justify-center gap-2 rounded-xl border-2 border-secondary px-5 py-3 text-center font-display text-base font-bold text-secondary sm:w-auto sm:px-7 sm:py-4 sm:text-lg">
          <span class="min-w-0 wrap-break-word">{{ content('secondaryAction') }}</span>
          <span class="material-symbols-outlined shrink-0">download</span>
        </a>
      </div>
      <div class="grid grid-cols-1 gap-3 pt-2 sm:grid-cols-3 sm:pt-4">
        <div *ngFor="let stat of arrayContent('stats')" class="rounded-2xl bg-white p-4 shadow-sm">
          <div class="font-display text-xl font-extrabold text-primary sm:text-2xl">{{ stat.value }}</div>
          <div class="text-xs font-semibold text-on-surface-variant">{{ text(stat.label) }}</div>
        </div>
      </div>
    </div>
    <div class="relative pb-8 sm:pb-0">
      <img class="aspect-4/3 w-full rounded-3xl border-4 border-white object-cover shadow-2xl sm:aspect-square sm:rounded-4xl sm:border-8 lg:max-h-140" [src]="section?.media?.url" [alt]="section?.media?.alt_text">
      <div class="absolute bottom-0 left-3 max-w-[calc(100%-24px)] rounded-2xl bg-white/90 p-4 shadow-xl backdrop-blur sm:-bottom-6 sm:-left-3 sm:max-w-none sm:p-5">
        <div class="flex items-center gap-3">
          <span class="material-symbols-outlined shrink-0 rounded-full bg-secondary p-3 text-white">emoji_events</span>
          <div>
            <div class="font-display font-bold text-primary">Excellence</div>
            <div class="text-sm text-on-surface-variant">{{ 'hero.results' | translate }}</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
