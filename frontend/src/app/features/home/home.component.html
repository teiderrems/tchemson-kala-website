<main *ngIf="sections.length; else loading">
  <app-hero-section [section]="hero" />
  <app-content-section *ngFor="let section of normalSections" [section]="section" />
</main>

<footer class="bg-surface-container-highest/75 py-12">
  <div class="container-page grid gap-8 md:grid-cols-3">
    <div>
      <h3 class="font-display text-2xl font-bold text-primary">Tchemson-Kala</h3>
      <p class="mt-3 text-on-surface-variant">{{ 'footer.tagline' | translate }}</p>
    </div>
    <div class="text-on-surface-variant">{{ 'footer.location' | translate }}</div>
    <div class="text-on-surface-variant">© 2026 Centre Educatif Bilingue Tchemson-Kala.</div>
  </div>
</footer>

<ng-template #loading>
  <div class="container-page py-24 text-center text-primary">{{ 'loading.sections' | translate }}</div>
</ng-template>
